<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hudbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b0e18"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <linearGradient id="xp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7b5cff"/>
    </linearGradient>
    <filter id="g2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="400" rx="10" fill="url(#hudbg)" stroke="#7b5cff" stroke-opacity="0.35" stroke-width="1.5"/>

  <polygon points="0,0 40,0 0,40" fill="url(#xp)" opacity="0.7"/>
  <polygon points="900,400 860,400 900,360" fill="url(#xp)" opacity="0.7"/>

  <text x="36" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="3" fill="#f2f4ff">SKILL TREE</text>

  <circle cx="830" cy="40" r="28" fill="#0b0e18" stroke="url(#xp)" stroke-width="2.5"/>
  <text x="830" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#9aa4c7">LVL</text>
  <text x="830" y="52" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="800" fill="#ffffff">03</text>

  <text x="36" y="78" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#6b7396" letter-spacing="2">PROGRESS TO NEXT LEVEL</text>
  <rect x="36" y="86" width="828" height="10" rx="5" fill="#151b2c"/>
  <rect x="36" y="86" width="560" height="10" rx="5" fill="url(#xp)" filter="url(#g2)"/>

  <g font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#dfe3f5">

    <text x="36" y="140">HTML / CSS</text>
    <text x="820" y="140" text-anchor="end" fill="#00e5ff">90%</text>
    <rect x="36" y="148" width="828" height="8" rx="4" fill="#151b2c"/>
    <rect x="36" y="148" width="745" height="8" rx="4" fill="url(#xp)"/>

    <text x="36" y="180">JAVASCRIPT</text>
    <text x="820" y="180" text-anchor="end" fill="#00e5ff">85%</text>
    <rect x="36" y="188" width="828" height="8" rx="4" fill="#151b2c"/>
    <rect x="36" y="188" width="704" height="8" rx="4" fill="url(#xp)"/>

    <text x="36" y="220">REACT</text>
    <text x="820" y="220" text-anchor="end" fill="#00e5ff">70%</text>
    <rect x="36" y="228" width="828" height="8" rx="4" fill="#151b2c"/>
    <rect x="36" y="228" width="580" height="8" rx="4" fill="url(#xp)"/>

    <text x="36" y="260">BACKEND (NODE)</text>
    <text x="820" y="260" text-anchor="end" fill="#00e5ff">50%</text>
    <rect x="36" y="268" width="828" height="8" rx="4" fill="#151b2c"/>
    <rect x="36" y="268" width="414" height="8" rx="4" fill="url(#xp)"/>

    <text x="36" y="300">PYTHON / C#</text>
    <text x="820" y="300" text-anchor="end" fill="#00e5ff">45%</text>
    <rect x="36" y="308" width="828" height="8" rx="4" fill="#151b2c"/>
    <rect x="36" y="308" width="372" height="8" rx="4" fill="url(#xp)"/>
  </g>

  <rect x="230" y="345" width="440" height="40" rx="6" fill="#0b0e18" stroke="#00e5ff" stroke-opacity="0.6" stroke-width="1">
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="370" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#00e5ff">
    ACHIEVEMENT UNLOCKED — Shipped a Full-Stack Project
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite"/>
  </text>
</svg>
