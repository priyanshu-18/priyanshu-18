<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7b5cff"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="260" fill="url(#bg)"/>

  <!-- angular hex-grid texture, subtle -->
  <g stroke="#7b5cff" stroke-opacity="0.06">
    <line x1="0" y1="0" x2="900" y2="260"/>
    <line x1="900" y1="0" x2="0" y2="260"/>
    <line x1="450" y1="0" x2="450" y2="260"/>
  </g>

  <!-- angular corner cuts -->
  <polygon points="0,0 60,0 0,60" fill="url(#accent)" opacity="0.8"/>
  <polygon points="900,260 840,260 900,200" fill="url(#accent)" opacity="0.8"/>

  <!-- top and bottom accent rules -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)"/>
  <rect x="0" y="257" width="900" height="3" fill="url(#accent)"/>

  <!-- title -->
  <text x="450" y="128" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="6" fill="#f2f4ff" filter="url(#glow)">
    PRIYANSHU
  </text>
  <rect x="345" y="145" width="210" height="3" fill="url(#accent)">
    <animate attributeName="width" values="0;210;210;0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <text x="450" y="180" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" letter-spacing="3" fill="#9aa4c7">
    FULL-STACK DEVELOPER  //  3RD YEAR B.TECH  //  GAMER AT HEART
  </text>

  <text x="450" y="220" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" letter-spacing="2" fill="#4c5578">
    always respawning, never giving up a run
  </text>
</svg>
